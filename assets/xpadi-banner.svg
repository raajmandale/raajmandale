<svg width="1600" height="700" viewBox="0 0 1600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="800" y1="0" x2="800" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1430"></stop>
      <stop offset="0.55" stop-color="#060B18"></stop>
      <stop offset="1" stop-color="#02040B"></stop>
    </linearGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 350) rotate(90) scale(220)">
      <stop stop-color="#64F4FF" stop-opacity="0.95"></stop>
      <stop offset="0.45" stop-color="#5C8DFF" stop-opacity="0.22"></stop>
      <stop offset="1" stop-color="#5C8DFF" stop-opacity="0"></stop>
    </radialGradient>

    <linearGradient id="lineGrad" x1="340" y1="350" x2="1260" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#64F4FF"></stop>
      <stop offset="0.5" stop-color="#5C8DFF"></stop>
      <stop offset="1" stop-color="#9F7BFF"></stop>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#5C8DFF" stroke-opacity="0.08" stroke-width="1"></path>
    </pattern>
  </defs>

  <rect width="1600" height="700" fill="url(#bgGrad)"></rect>
  <rect width="1600" height="700" fill="url(#grid)"></rect>

  <circle cx="800" cy="350" r="260" fill="url(#coreGlow)">
    <animate attributeName="r" values="248;270;248" dur="4s" repeatCount="indefinite"></animate>
  </circle>

  <g opacity="0.35">
    <circle cx="800" cy="350" r="210" stroke="url(#lineGrad)" stroke-width="1.5" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="0 800 350" to="360 800 350" dur="22s" repeatCount="indefinite"></animateTransform>
    </circle>
    <circle cx="800" cy="350" r="165" stroke="#64F4FF" stroke-opacity="0.3" stroke-width="1.5" fill="none" stroke-dasharray="10 10">
      <animateTransform attributeName="transform" type="rotate" from="360 800 350" to="0 800 350" dur="14s" repeatCount="indefinite"></animateTransform>
    </circle>
    <circle cx="800" cy="350" r="120" stroke="#9F7BFF" stroke-opacity="0.25" stroke-width="1.5" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="0 800 350" to="360 800 350" dur="10s" repeatCount="indefinite"></animateTransform>
    </circle>
  </g>

  <g filter="url(#softGlow)">
    <path d="M500 220L705 315" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 12">
      <animate attributeName="stroke-dashoffset" values="80;0" dur="1.8s" repeatCount="indefinite"></animate>
    </path>
    <path d="M1100 220L895 315" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 12">
      <animate attributeName="stroke-dashoffset" values="80;0" dur="1.8s" repeatCount="indefinite"></animate>
    </path>
    <path d="M520 500L720 388" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 12">
      <animate attributeName="stroke-dashoffset" values="80;0" dur="1.8s" repeatCount="indefinite"></animate>
    </path>
    <path d="M1080 500L880 388" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 12">
      <animate attributeName="stroke-dashoffset" values="80;0" dur="1.8s" repeatCount="indefinite"></animate>
    </path>
  </g>

  <g>
    <circle cx="800" cy="350" r="72" fill="#0A1228" stroke="#64F4FF" stroke-width="2.5"></circle>
    <circle cx="800" cy="350" r="34" fill="#64F4FF" fill-opacity="0.14" stroke="#64F4FF" stroke-width="2">
      <animate attributeName="r" values="30;38;30" dur="2.2s" repeatCount="indefinite"></animate>
    </circle>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="800" y="128" fill="#EAF4FF" font-size="74" font-weight="800" letter-spacing="3">XPADI</text>
    <text x="800" y="182" fill="#8FB0DA" font-size="26" font-weight="600" letter-spacing="7">SURVIVABILITY PROOF ENGINE</text>

    <g>
      <rect x="617" y="560" width="366" height="52" rx="26" fill="#56F0A6" fill-opacity="0.12" stroke="#56F0A6" stroke-opacity="0.35"></rect>
      <text x="800" y="594" fill="#D9FFEA" font-size="28" font-weight="800" letter-spacing="2">ATTACK ≠ DATA LOSS</text>
    </g>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">
    <g>
      <circle cx="500" cy="220" r="15" fill="#64F4FF" fill-opacity="0.14" stroke="#64F4FF" stroke-width="2"></circle>
      <text x="500" y="197" fill="#C8F8FF" text-anchor="middle">SELECT</text>
    </g>
    <g>
      <circle cx="1100" cy="220" r="15" fill="#5C8DFF" fill-opacity="0.14" stroke="#5C8DFF" stroke-width="2"></circle>
      <text x="1100" y="197" fill="#D4DEFF" text-anchor="middle">PROTECT</text>
    </g>
    <g>
      <circle cx="520" cy="500" r="15" fill="#FFD166" fill-opacity="0.16" stroke="#FFD166" stroke-width="2"></circle>
      <text x="520" y="535" fill="#FFE5A0" text-anchor="middle">ATTACK</text>
    </g>
    <g>
      <circle cx="1080" cy="500" r="15" fill="#56F0A6" fill-opacity="0.16" stroke="#56F0A6" stroke-width="2"></circle>
      <text x="1080" y="535" fill="#D7FFEA" text-anchor="middle">RECOVER / VERIFY</text>
    </g>
  </g>
</svg>