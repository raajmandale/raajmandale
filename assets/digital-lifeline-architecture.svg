<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Distributed Data Survivability System">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cc8ff"/><stop offset="100%" stop-color="#2f80ff"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd4a6"/><stop offset="100%" stop-color="#ff8a1f"/>
    </linearGradient>
    <filter id="glowBlue" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif}
      .title{font-size:40px;font-weight:700;fill:#11263c}
      .subtitle{font-size:20px;fill:#5b7288}
      .label{font-size:22px;font-weight:700;fill:#11263c}
      .small{font-size:16px;fill:#60788f}
      .card{fill:#ffffff;stroke:#e6eef6;stroke-width:2}
      .flow{fill:none;stroke-linecap:round;stroke-width:5;stroke-dasharray:10 14;animation:dash 3.2s linear infinite}
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .float{animation:float 6s ease-in-out infinite}
      .spinSlow{animation:spin 10s linear infinite; transform-origin:center}
      .glowBlue{filter:url(#glowBlue)}
      .glowOrange{filter:url(#glowOrange)}
      .bar{animation:bar 3s ease-in-out infinite}
      .scan{animation:scan 2.8s ease-in-out infinite}
      .gate{animation:gate 2.8s ease-in-out infinite}
      .blinkRed{animation:blinkRed 1.5s ease-in-out infinite}
      .token{animation:breathe 2.6s ease-in-out infinite}
      .grid{stroke:#ebf2f8;stroke-width:1}
      @keyframes dash{to{stroke-dashoffset:-120}}
      @keyframes pulse{50%{transform:scale(1.05)}}
      @keyframes float{50%{transform:translateY(-8px)}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes bar{50%{transform:scaleX(1.25)}}
      @keyframes scan{50%{transform:translateX(70px)}}
      @keyframes gate{50%{transform:translateX(12px)}}
      @keyframes blinkRed{50%{opacity:.25}}
      @keyframes breathe{50%{transform:scale(1.07)}}
    </style>

  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g>
    <path class="grid" d="M0 120H1600M0 240H1600M0 360H1600M0 480H1600M0 600H1600M0 720H1600"/>
    <path class="grid" d="M120 0V900M320 0V900M520 0V900M720 0V900M920 0V900M1120 0V900M1320 0V900M1520 0V900"/>
  </g>
  <text x="95" y="90" class="title">Distributed Data Survivability System</text>
  <text x="95" y="125" class="subtitle">User data → fragment & encrypt → multi-location storage → reconstruction brain → restored data</text>
  
<rect x="60" y="250" width="210" height="180" rx="28" class="card"/>
<text x="88" y="298" class="label">User Data</text>
<text x="88" y="332" class="small">source object</text>
<rect x="320" y="250" width="240" height="180" rx="28" class="card"/>
<text x="348" y="298" class="label">Fragment & Encrypt</text>
<text x="348" y="332" class="small">split into capsules</text>
<text x="348" y="358" class="small">secure each unit</text>
<rect x="620" y="180" width="280" height="320" rx="28" class="card"/>
<text x="648" y="228" class="label">Multi-Location Storage</text>
<text x="648" y="262" class="small">device</text>
<text x="648" y="288" class="small">cloud</text>
<text x="648" y="314" class="small">external nodes</text>
<rect x="960" y="250" width="240" height="180" rx="28" class="card"/>
<text x="988" y="298" class="label">Reconstruction Brain</text>
<text x="988" y="332" class="small">metadata only</text>
<text x="988" y="358" class="small">no full file storage</text>
<rect x="1260" y="250" width="220" height="180" rx="28" class="card"/>
<text x="1288" y="298" class="label">Restored Data</text>
<text x="1288" y="332" class="small">usable rebuilt output</text>

<path class="flow" stroke="url(#blue)" d="M270 340 C290 340,300 340,320 340"/>
<path class="flow" stroke="url(#orange)" d="M560 340 C585 340,595 340,620 340"/>
<path class="flow" stroke="url(#blue)" d="M900 340 C930 340,940 340,960 340"/>
<path class="flow" stroke="url(#orange)" d="M1200 340 C1225 340,1235 340,1260 340"/>

<g class="pulse glowBlue" transform="translate(165 340)">
  <circle cx="0" cy="0" r="30" fill="#eef6ff"/><circle cx="0" cy="0" r="12" fill="#2f80ff"/>
</g>

<g transform="translate(380 310)" class="float">
  <rect x="0" y="0" width="26" height="26" rx="8" fill="#2f80ff"/>
  <rect x="36" y="-18" width="26" height="26" rx="8" fill="#ff8a1f"/>
  <rect x="72" y="14" width="26" height="26" rx="8" fill="#8dcaff"/>
</g>

<g transform="translate(700 240)">
  <circle cx="-28" cy="20" r="14" fill="#2f80ff"/>
  <circle cx="28" cy="-12" r="14" fill="#ff8a1f"/>
  <circle cx="78" cy="34" r="14" fill="#8dcaff"/>
  <path d="M0 0 L60 -40 M0 0 L80 20 M0 0 L-60 20" stroke="#d5eafb" stroke-width="3" fill="none"/>
  <circle cx="0" cy="0" r="18" fill="#eef6ff"/><circle cx="0" cy="0" r="8" fill="#2f80ff"/>
  <text x="-78" y="110" class="small">device</text><text x="48" y="110" class="small">cloud</text><text x="112" y="110" class="small">node</text>
</g>

<g transform="translate(1030 340)" class="pulse">
  <circle cx="0" cy="0" r="42" fill="#eef6ff"/><circle cx="0" cy="0" r="16" fill="#2f80ff"/>
  <circle cx="0" cy="0" r="58" fill="none" stroke="#d7eaff" stroke-width="3" stroke-dasharray="8 12" class="spinSlow"/>
</g>

<g class="pulse glowBlue" transform="translate(1365 340)">
  <circle cx="0" cy="0" r="30" fill="#eef6ff"/><circle cx="0" cy="0" r="12" fill="#2f80ff"/>
</g>

</svg>