<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Failure Reconstruction Architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cc8ff"/><stop offset="100%" stop-color="#2f80ff"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd4a6"/><stop offset="100%" stop-color="#ff8a1f"/>
    </linearGradient>
    <filter id="glowBlue" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif}
      .title{font-size:40px;font-weight:700;fill:#11263c}
      .subtitle{font-size:20px;fill:#5b7288}
      .label{font-size:22px;font-weight:700;fill:#11263c}
      .small{font-size:16px;fill:#60788f}
      .card{fill:#ffffff;stroke:#e6eef6;stroke-width:2}
      .flow{fill:none;stroke-linecap:round;stroke-width:5;stroke-dasharray:10 14;animation:dash 3.2s linear infinite}
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .float{animation:float 6s ease-in-out infinite}
      .spinSlow{animation:spin 10s linear infinite; transform-origin:center}
      .glowBlue{filter:url(#glowBlue)}
      .glowOrange{filter:url(#glowOrange)}
      .bar{animation:bar 3s ease-in-out infinite}
      .scan{animation:scan 2.8s ease-in-out infinite}
      .gate{animation:gate 2.8s ease-in-out infinite}
      .blinkRed{animation:blinkRed 1.5s ease-in-out infinite}
      .token{animation:breathe 2.6s ease-in-out infinite}
      .grid{stroke:#ebf2f8;stroke-width:1}
      @keyframes dash{to{stroke-dashoffset:-120}}
      @keyframes pulse{50%{transform:scale(1.05)}}
      @keyframes float{50%{transform:translateY(-8px)}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes bar{50%{transform:scaleX(1.25)}}
      @keyframes scan{50%{transform:translateX(70px)}}
      @keyframes gate{50%{transform:translateX(12px)}}
      @keyframes blinkRed{50%{opacity:.25}}
      @keyframes breathe{50%{transform:scale(1.07)}}
    </style>

  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g>
    <path class="grid" d="M0 120H1600M0 240H1600M0 360H1600M0 480H1600M0 600H1600M0 720H1600"/>
    <path class="grid" d="M120 0V900M320 0V900M520 0V900M720 0V900M920 0V900M1120 0V900M1320 0V900M1520 0V900"/>
  </g>
  <text x="95" y="90" class="title">Failure Reconstruction Architecture</text>
  <text x="95" y="125" class="subtitle">Original state → fragment engine → distributed graph → failure event → rebuild output</text>
  
<rect x="70" y="250" width="220" height="170" rx="28" class="card"/>
<text x="98" y="298" class="label">Original State</text>
<text x="98" y="332" class="small">intact memory object</text>
<rect x="340" y="250" width="220" height="170" rx="28" class="card"/>
<text x="368" y="298" class="label">Fragment Engine</text>
<text x="368" y="332" class="small">split</text>
<text x="368" y="358" class="small">hash</text>
<text x="368" y="384" class="small">map</text>
<rect x="610" y="190" width="260" height="290" rx="28" class="card"/>
<text x="638" y="238" class="label">Distributed Graph</text>
<text x="638" y="272" class="small">multi-node placement</text>
<text x="638" y="298" class="small">survivability links</text>
<rect x="930" y="250" width="220" height="170" rx="28" class="card"/>
<text x="958" y="298" class="label">Failure Event</text>
<text x="958" y="332" class="small">node loss</text>
<text x="958" y="358" class="small">graph disruption</text>
<rect x="1200" y="250" width="220" height="170" rx="28" class="card"/>
<text x="1228" y="298" class="label">Rebuild Engine</text>
<text x="1228" y="332" class="small">path recovery</text>
<text x="1228" y="358" class="small">state reconstruction</text>
<rect x="1200" y="470" width="220" height="170" rx="28" class="card"/>
<text x="1228" y="518" class="label">Recovered Output</text>
<text x="1228" y="552" class="small">stable rebuilt state</text>

<path class="flow" stroke="url(#blue)" d="M290 335 C315 335,325 335,340 335"/>
<path class="flow" stroke="url(#orange)" d="M560 335 C580 335,590 335,610 335"/>
<path class="flow" stroke="url(#blue)" d="M870 335 C900 335,910 335,930 335"/>
<path class="flow" stroke="url(#orange)" d="M1150 335 C1170 335,1185 335,1200 335"/>
<path class="flow" stroke="url(#blue)" d="M1310 420 C1310 445,1310 455,1310 470"/>

<g class="pulse glowBlue"><circle cx="180" cy="335" r="28" fill="#eef6ff"/><circle cx="180" cy="335" r="12" fill="#2f80ff"/></g>
<g transform="translate(390 310)" class="float">
  <circle cx="0" cy="0" r="10" fill="#2f80ff"/>
  <circle cx="42" cy="-18" r="10" fill="#ff8a1f"/>
  <circle cx="70" cy="18" r="10" fill="#8ecbff"/>
  <path d="M0 0 L42 -18 L70 18" fill="none" stroke="#d6eafb" stroke-width="3"/>
</g>

<g transform="translate(650 250)">
  <circle cx="0" cy="0" r="12" fill="#2f80ff"/>
  <circle cx="90" cy="-30" r="12" fill="#ff8a1f"/>
  <circle cx="160" cy="35" r="12" fill="#2f80ff"/>
  <circle cx="90" cy="100" r="12" fill="#8cc8ff"/>
  <circle cx="205" cy="135" r="14" fill="#ff4b4b" class="blinkRed"/>
  <path class="flow" stroke="url(#blue)" d="M0 0 L90 -30 L160 35 L90 100 Z"/>
  <path class="flow" stroke="url(#orange)" d="M90 -30 L205 135 L90 100"/>
</g>

<g class="blinkRed"><circle cx="1040" cy="335" r="14" fill="#ff4b4b"/><circle cx="1040" cy="335" r="26" fill="none" stroke="#ffb1b1" stroke-width="3"/></g>

<g transform="translate(1260 305)" class="pulse">
  <circle cx="50" cy="30" r="42" fill="#eef6ff"/>
  <path d="M50 2 V58 M22 30 H78" stroke="#2f80ff" stroke-width="6" stroke-linecap="round" class="spinSlow"/>
</g>

<g class="pulse glowBlue" transform="translate(1310 555)">
  <circle cx="0" cy="0" r="34" fill="#eef6ff"/><circle cx="0" cy="0" r="12" fill="#2f80ff"/>
</g>

</svg>