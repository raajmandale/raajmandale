<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Decision Gate Flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cc8ff"/><stop offset="100%" stop-color="#2f80ff"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd4a6"/><stop offset="100%" stop-color="#ff8a1f"/>
    </linearGradient>
    <filter id="glowBlue" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif}
      .title{font-size:40px;font-weight:700;fill:#11263c}
      .subtitle{font-size:20px;fill:#5b7288}
      .label{font-size:22px;font-weight:700;fill:#11263c}
      .small{font-size:16px;fill:#60788f}
      .card{fill:#ffffff;stroke:#e6eef6;stroke-width:2}
      .flow{fill:none;stroke-linecap:round;stroke-width:5;stroke-dasharray:10 14;animation:dash 3.2s linear infinite}
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .float{animation:float 6s ease-in-out infinite}
      .spinSlow{animation:spin 10s linear infinite; transform-origin:center}
      .glowBlue{filter:url(#glowBlue)}
      .glowOrange{filter:url(#glowOrange)}
      .bar{animation:bar 3s ease-in-out infinite}
      .scan{animation:scan 2.8s ease-in-out infinite}
      .gate{animation:gate 2.8s ease-in-out infinite}
      .blinkRed{animation:blinkRed 1.5s ease-in-out infinite}
      .token{animation:breathe 2.6s ease-in-out infinite}
      .grid{stroke:#ebf2f8;stroke-width:1}
      @keyframes dash{to{stroke-dashoffset:-120}}
      @keyframes pulse{50%{transform:scale(1.05)}}
      @keyframes float{50%{transform:translateY(-8px)}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes bar{50%{transform:scaleX(1.25)}}
      @keyframes scan{50%{transform:translateX(70px)}}
      @keyframes gate{50%{transform:translateX(12px)}}
      @keyframes blinkRed{50%{opacity:.25}}
      @keyframes breathe{50%{transform:scale(1.07)}}
    </style>

  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g>
    <path class="grid" d="M0 120H1600M0 240H1600M0 360H1600M0 480H1600M0 600H1600M0 720H1600"/>
    <path class="grid" d="M120 0V900M320 0V900M520 0V900M720 0V900M920 0V900M1120 0V900M1320 0V900M1520 0V900"/>
  </g>
  <text x="95" y="90" class="title">Decision Gate Flow</text>
  <text x="95" y="125" class="subtitle">Intent trigger → HOLD layer → approval gate → execute path → audit trail</text>
  
<rect x="70" y="250" width="220" height="180" rx="28" class="card"/>
<text x="98" y="298" class="label">Intent Trigger</text>
<text x="98" y="332" class="small">payment / app access</text>
<rect x="350" y="250" width="220" height="180" rx="28" class="card"/>
<text x="378" y="298" class="label">HOLD Layer</text>
<text x="378" y="332" class="small">pause irreversible action</text>
<rect x="630" y="250" width="220" height="180" rx="28" class="card"/>
<text x="658" y="298" class="label">Approval Gate</text>
<text x="658" y="332" class="small">trusted decision checkpoint</text>
<rect x="910" y="250" width="220" height="180" rx="28" class="card"/>
<text x="938" y="298" class="label">Execute Path</text>
<text x="938" y="332" class="small">approved action only</text>
<rect x="1190" y="250" width="250" height="180" rx="28" class="card"/>
<text x="1218" y="298" class="label">Audit Trail</text>
<text x="1218" y="332" class="small">logged outcome</text>
<text x="1218" y="358" class="small">clear trace</text>

<path class="flow" stroke="url(#blue)" d="M290 340 C315 340,325 340,350 340"/>
<path class="flow" stroke="url(#orange)" d="M570 340 C595 340,605 340,630 340"/>
<path class="flow" stroke="url(#blue)" d="M850 340 C875 340,885 340,910 340"/>
<path class="flow" stroke="url(#orange)" d="M1130 340 C1155 340,1165 340,1190 340"/>

<g class="pulse glowBlue" transform="translate(180 340)">
  <circle cx="0" cy="0" r="28" fill="#eef6ff"/><circle cx="0" cy="0" r="12" fill="#2f80ff"/>
</g>
<g transform="translate(460 340)">
  <rect x="-55" y="-38" width="110" height="76" rx="18" fill="#fff3e6" stroke="#ffdcb7"/>
  <rect x="-12" y="-55" width="24" height="34" rx="12" fill="#ff8a1f"/>
  <rect x="-26" y="-8" width="52" height="30" rx="10" fill="#ff8a1f"/>
</g>
<g transform="translate(740 340)">
  <rect x="-70" y="-44" width="140" height="88" rx="20" fill="#eef6ff" stroke="#dcecff"/>
  <rect x="-40" y="-24" width="34" height="48" rx="10" fill="#2f80ff" class="gate"/>
  <rect x="6" y="-24" width="34" height="48" rx="10" fill="#8cc8ff" class="gate"/>
</g>
<g transform="translate(1020 340)" class="pulse">
  <circle cx="0" cy="0" r="36" fill="#eef6ff"/><path d="M-14 0 L-2 12 L18 -14" stroke="#2f80ff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<g transform="translate(1315 340)" class="float">
  <rect x="-55" y="-40" width="110" height="80" rx="18" fill="#ffffff" stroke="#dcecff"/>
  <path d="M-30 -10 H30 M-30 8 H18" stroke="#9dcfff" stroke-width="6" stroke-linecap="round"/>
  <circle cx="-30" cy="-24" r="6" fill="#ff8a1f"/>
</g>

</svg>